name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-structure:
    name: HTML structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML well-formedness
        run: python3 scripts/validate_html.py rust-tutorial.html

  pytest:
    name: Tutorial tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: html-structure
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ matrix.browser }}-v1

      - name: Install Python deps
        run: pip install --quiet -r requirements-dev.txt

      - name: Install ${{ matrix.browser }} (with system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python3 -m playwright install --with-deps ${{ matrix.browser }}

      - name: Install ${{ matrix.browser }} system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python3 -m playwright install-deps ${{ matrix.browser }}

      - name: Run pytest
        run: pytest tests/ --browser ${{ matrix.browser }} -n auto --tb=short

  fedit:
    name: fedit cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('fedit/src-tauri/Cargo.toml') }}

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: fedit/src-tauri/target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('fedit/src-tauri/Cargo.toml', 'fedit/src-tauri/src/**/*.rs') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: cargo check
        run: cargo check --manifest-path fedit/src-tauri/Cargo.toml --locked
