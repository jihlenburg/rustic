name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-structure:
    name: HTML structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML well-formedness
        run: python3 scripts/validate_html.py rust-tutorial.html

  playwright-sweep:
    name: Playwright correctness sweep
    runs-on: ubuntu-latest
    needs: html-structure
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-playwright

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-chromium

      - name: Install Playwright
        run: pip install --quiet playwright

      - name: Install Chromium (with system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python3 -m playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python3 -m playwright install-deps chromium

      - name: Run sweep
        run: python3 scripts/playwright_check.py
